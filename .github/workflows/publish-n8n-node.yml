name: Publish n8n Node

on:
  push:
    branches: [main]
    paths:
      - "packages/integrations/n8n-node/**"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/integrations/n8n-node
        run: npm install

      - name: Build
        working-directory: packages/integrations/n8n-node
        run: npm run build

      - name: Publish to npm
        working-directory: packages/integrations/n8n-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
