# SDK Release & Publish Pipeline
#
# Uses release-please for automated versioning based on Conventional Commits:
#   fix(sdk):  → patch bump (0.0.x)
#   feat(sdk): → minor bump (0.x.0)
#   feat(sdk)!: or BREAKING CHANGE → major bump (x.0.0)
#
# Other prefixes (chore:, docs:, refactor:) are included in the next
# release but won't trigger one on their own.
#
# Flow: push to main → release-please opens a PR → merge PR → npm publish
# Manual dispatch (workflow_dispatch) re-runs release-please to recover from failures.

name: Release & Publish SDK

on:
  push:
    branches: [main]
    paths:
      - "packages/sdk/**"
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/sdk--release_created'] }}
      version: ${{ steps.release.outputs['packages/sdk--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        working-directory: packages/sdk
        run: npx tsc -p tsconfig.build.json

      - name: Publish to npm
        working-directory: packages/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
