name: Build & Publish Downloader

on:
  push:
    branches: [main]
    paths:
      - "apps/downloader/**"
  workflow_dispatch: # manual trigger

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        working-directory: apps/downloader
        run: |
          VERSION=$(grep -m1 'version' pyproject.toml | cut -d'"' -f2)
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/downloader
          push: true
          tags: |
            zanhk/relayapi-downloader:latest
            zanhk/relayapi-downloader:${{ steps.version.outputs.version }}
            zanhk/relayapi-downloader:${{ steps.version.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
