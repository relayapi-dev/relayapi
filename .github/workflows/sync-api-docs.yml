name: Sync API Reference Docs

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Regenerate API reference docs
        working-directory: apps/docs
        run: bun run generate-docs

      - name: Commit if changed
        run: |
          set -euo pipefail
          # Safety net: never commit an empty API reference (this is how every
          # page was wiped before). generate-docs already fails on empty output,
          # but guard here too in case it is ever bypassed.
          mdx_count=$(find apps/docs/content/docs/api-reference -name '*.mdx' | wc -l | tr -d ' ')
          if [ "$mdx_count" -eq 0 ]; then
            echo "::error::API reference contains zero .mdx files — refusing to commit a wipe."
            exit 1
          fi
          echo "API reference has $mdx_count pages."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/docs/content/docs/api-reference/
          git diff --cached --quiet || git commit -m "chore: sync API reference docs from live spec"
          git push
