name: CI — API

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "packages/auth/**"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/db/**"
      - "packages/auth/**"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: cd packages/db && bun run tsc --noEmit
      - run: cd packages/auth && bun run tsc --noEmit
      - run: cd apps/api && bun run tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run API tests
        working-directory: apps/api
        run: bun test src/__tests__/connect-oauth.test.ts src/__tests__/unit.test.ts src/__tests__/auth.test.ts src/__tests__/publishers.test.ts
