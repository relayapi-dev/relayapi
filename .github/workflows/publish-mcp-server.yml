# MCP Server Release & Publish Pipeline
#
# Uses release-please for automated versioning based on Conventional Commits:
#   fix(mcp):  → patch bump
#   feat(mcp): → minor bump
#   feat(mcp)!: or BREAKING CHANGE → major bump
#
# Flow: push to main → release-please opens a PR → merge PR → npm publish

name: Release & Publish MCP Server

on:
  push:
    branches: [main]
    paths:
      - "packages/mcp/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['packages/mcp--release_created'] }}
      version: ${{ steps.release.outputs['packages/mcp--version'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK (required as a workspace:* dependency)
        working-directory: packages/sdk
        run: npx tsc -p tsconfig.build.json

      - name: Build MCP server
        working-directory: packages/mcp
        run: npx tsc -p tsconfig.build.json

      - name: Publish to npm
        working-directory: packages/mcp
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
