name: CI — App

# PR checks only — pushes to main run the same typecheck + tests as the
# gating job inside .github/workflows/deploy-app.yml.

on:
  pull_request:
    paths:
      - "apps/app/**"
      - "packages/db/**"
      - "packages/auth/**"
      - "packages/sdk/**"

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build:sdk
      - run: cd apps/app && bun run tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run app tests
        working-directory: apps/app
        run: bun test
