name: Push Zapier App

on:
  push:
    branches: [main]
    paths:
      - "packages/integrations/zapier-app/**"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: packages/integrations/zapier-app
        run: npm install

      - name: Build
        working-directory: packages/integrations/zapier-app
        run: npm run build

      - name: Validate
        working-directory: packages/integrations/zapier-app
        run: npx zapier validate
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}

      - name: Push to Zapier
        working-directory: packages/integrations/zapier-app
        run: npx zapier push
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
